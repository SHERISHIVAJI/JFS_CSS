<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zoom-meeting-template</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="main">
        <div class="verification">
            <i class="bi bi-shield-fill-check" id="verify"></i>
            <i class="bi bi-list" id="view">View</i>
        </div>

        <div class="participants">
            <div class="part-full">
                <i class="bi bi-person-fill"></i>
                <p>Username1</p>
            </div>
            <div class="list-part">
                <div class="users user-1">
                    <i class="bi bi-person-fill"></i>
                    <div class="user-details">
                        <i class="bi bi-mic-mute"></i>
                        <p>Username2</p>
                    </div>
                </div>
                <div class="users user-2">
                    <i class="bi bi-person-fill"></i>
                    <div class="user-details">
                        <i class="bi bi-mic-mute"></i>
                        <p>Username2</p>
                    </div>
                </div>
                <div class="users user-3">
                    <i class="bi bi-person-fill"></i>
                    <div class="user-details">
                        <i class="bi bi-mic-mute"></i>
                        <p>Username2</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="host-access">
            <div class="access-items">
                <i class="bi bi-mic-fill"></i>
                <span>^</span>
                <p>Mute</p>
            </div>
            <div class="access-items">
                <i class="bi bi-camera-video-off-fill"></i>
                <span>^</span>
                <p>Start Video</p>
            </div>
            <div class="access-items">
                <i class="bi bi-shield-shaded"></i>
                <p>Security</p>
            </div>
            <div class="access-items">
                <i class="bi bi-people-fill"></i><sup>4</sup>
                <span>^</span>
                <p>Participants</p>
            </div>
            <div class="access-items">
                <i class="bi bi-chat-left-fill"></i>
                <span>^</span>
                <p>Chat</p>
            </div>
            <div class="access-items screen-share">
                <i class="bi bi-arrow-up-square-fill"></i>
                <span>^</span>
                <p>Share Screen</p>
            </div>
            <div class="access-items">
                <i class="bi bi-record2"></i>
                <p>Record</p>
            </div>
            <div class="access-items">
                <i class="bi bi-cc-square-fill"></i>
                <span>^</span>
                <p>Show Caption</p>
            </div>
            <div class="access-items">
                <i class="bi bi-emoji-laughing"></i>
                <span>^</span>
                <p>Reaction</p>
            </div>
            <div class="access-items">
                <i class="bi bi-app-indicator"></i>
                <p>Apps</p>
            </div>
            <div class="access-items">
                <i class="bi bi-pencil-square"></i>
                <p>Whiteboards</p>
            </div>
            <div class="access-items">
                <b>End</b>
            </div>
        </div>
    </div>
</body>
</html>
